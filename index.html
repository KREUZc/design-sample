<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>design-sample · GITS Future Themes</title>
  <style>
    :root{--bg:#05070b;--fg:#d8ecff;--muted:#9bb7cf;--line:rgba(120,190,255,.25)}
    *{box-sizing:border-box} body{margin:0;font-family:"IBM Plex Sans",Inter,system-ui;background:radial-gradient(circle at 20% 10%,#0b1220 0,#05070b 48%,#030406 100%);color:var(--fg)}
    .scan{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(130,190,255,.03),rgba(130,190,255,.03) 1px,transparent 1px,transparent 3px);mix-blend-mode:screen;opacity:.45;z-index:2}
    #fx{position:fixed;inset:0;pointer-events:none;z-index:1}
    .wrap{max-width:1200px;margin:0 auto;padding:26px 18px 40px;position:relative;z-index:3}
    h1{font-size:28px;letter-spacing:.08em;margin:0 0 6px;text-transform:uppercase}
    .desc{opacity:.9;margin:0 0 14px;color:var(--muted)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 18px}
    .btn{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(20,40,60,.35);color:var(--fg);cursor:pointer;font-size:12px;letter-spacing:.06em;text-transform:uppercase}
    .btn.active{background:#9fd8ff;color:#02111f;border-color:#9fd8ff}
    .hero{border-radius:18px;overflow:hidden;min-height:460px;position:relative;padding:30px;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 0 0 1px rgba(175,220,255,.08),0 0 60px rgba(60,150,255,.12)}
    .hero::before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 40%,rgba(170,220,255,.08) 47%,transparent 55%);animation:sweep 6s linear infinite}
    @keyframes sweep{from{transform:translateX(-60%)}to{transform:translateX(65%)}}
    .tag{display:inline-block;font-size:11px;padding:6px 10px;border-radius:999px;background:rgba(120,190,255,.18);border:1px solid var(--line)}
    .title{font-size:56px;font-weight:800;line-height:1.03;letter-spacing:.04em;margin:12px 0}
    .sub{font-size:16px;line-height:1.8;max-width:56ch;color:var(--muted)}
    .cta{align-self:flex-start;margin-top:16px;padding:11px 15px;border-radius:10px;border:1px solid rgba(160,220,255,.7);text-decoration:none;color:inherit;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(10,30,50,.35)}
    .meta{display:flex;gap:12px;align-items:center;font-size:12px;color:#a3c7e8;margin-top:12px}
    .thumb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:18px}
    .thumb{border-radius:12px;min-height:84px;border:1px solid var(--line);padding:10px;cursor:pointer;display:flex;align-items:flex-end;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

    .t1{background:linear-gradient(135deg,#07111e,#0d2238,#16507a)}
    .t2{background:linear-gradient(135deg,#041317,#0b3c44,#0a7f88)}
    .t3{background:linear-gradient(135deg,#160512,#5c1244,#c0267a)}
    .t4{background:linear-gradient(135deg,#11131a,#2f3646,#7b879f)}
    .t5{background:linear-gradient(135deg,#1a1205,#6e4a0d,#e8a300)}
    .t6{background:linear-gradient(135deg,#070809,#1e2c31,#86f0ff)}
  </style>
</head>
<body>
  <canvas id="fx"></canvas>
  <div class="scan"></div>
  <div class="wrap">
    <h1>Ghost Interface · Homepage Style Lab</h1>
    <p class="desc">攻殼機動隊氛圍：冷色金屬、HUD 光層、神經連網感。六種未來感 theme 可切換。</p>

    <div class="toolbar" id="toolbar"></div>

    <section class="hero" id="hero">
      <div>
        <span class="tag" id="tag"></span>
        <div class="title" id="title"></div>
        <div class="sub" id="sub"></div>
        <a class="cta" id="cta" href="#">Initialize Protocol</a>
      </div>
      <div class="meta"><span id="palette"></span><span id="tone"></span></div>
    </section>

    <div class="thumb-grid" id="thumbs"></div>
  </div>

<script>
const themes=[
 {id:'t1',name:'Neo Tokyo Blue',title:'神經介面・深海藍',sub:'以冷靜藍黑建立「高科技可信任感」，適合 AI 顧問與系統架構品牌。',cta:'Initialize Protocol',palette:'#07111e / #0d2238 / #16507a',tone:'Tactical / Analytical'},
 {id:'t2',name:'Cyan Network',title:'網絡流・青綠訊號',sub:'像資料流在暗網中穿行，強調即時協作與自動化流程。',cta:'Open Data Stream',palette:'#041317 / #0b3c44 / #0a7f88',tone:'Connected / Fluid'},
 {id:'t3',name:'Cyber Magenta',title:'賽博脈衝・洋紅',sub:'偏強烈風格，用於凸顯創新實驗、前衛敘事與產品突破。',cta:'Run Experiment',palette:'#160512 / #5c1244 / #c0267a',tone:'Bold / Experimental'},
 {id:'t4',name:'Steel Shell',title:'義體金屬・灰鋼',sub:'低飽和金屬質地，傳達高端、穩定、戰術級執行。',cta:'Deploy Stack',palette:'#11131a / #2f3646 / #7b879f',tone:'Premium / Controlled'},
 {id:'t5',name:'Amber Alert',title:'警戒琥珀・行動指令',sub:'以警示橘黃作為行動導向，適合 CTA 強、銷售導向首頁。',cta:'Execute Mission',palette:'#1a1205 / #6e4a0d / #e8a300',tone:'Urgent / Action'},
 {id:'t6',name:'Ghost White',title:'電子幽靈・冷白',sub:'高對比冷白訊號風，兼具未來感與內容可讀性。',cta:'Sync Consciousness',palette:'#070809 / #1e2c31 / #86f0ff',tone:'Minimal / Futuristic'},
];
const hero=document.getElementById('hero');
const ids=['tag','title','sub','cta','palette','tone'].reduce((a,id)=>(a[id]=document.getElementById(id),a),{});
const tb=document.getElementById('toolbar'); const thumbs=document.getElementById('thumbs');
let current='t1';
function render(){
  const t=themes.find(x=>x.id===current);
  hero.className='hero '+t.id;
  ids.tag.textContent=`Theme · ${t.name}`;
  ids.title.textContent=t.title; ids.sub.textContent=t.sub; ids.cta.textContent=t.cta;
  ids.palette.textContent=`Palette: ${t.palette}`; ids.tone.textContent=`Tone: ${t.tone}`;
  [...tb.children].forEach(x=>x.classList.toggle('active',x.dataset.id===current));
}
themes.forEach(t=>{
  const b=document.createElement('button'); b.className='btn'; b.dataset.id=t.id; b.textContent=t.name; b.onclick=()=>{current=t.id;render()}; tb.appendChild(b);
  const k=document.createElement('div'); k.className='thumb '+t.id; k.textContent=t.name; k.onclick=()=>{current=t.id;render();window.scrollTo({top:0,behavior:'smooth'})}; thumbs.appendChild(k);
});
render();

// particle neural current interaction
const canvas=document.getElementById('fx');
const ctx=canvas.getContext('2d');
let w=0,h=0,dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
let mouse={x:-9999,y:-9999,active:false};
const particles=[];
const COUNT=95;
function resize(){w=window.innerWidth;h=window.innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}
function rand(a,b){return Math.random()*(b-a)+a}
function initParticles(){particles.length=0;for(let i=0;i<COUNT;i++){particles.push({x:rand(0,w),y:rand(0,h),vx:rand(-.22,.22),vy:rand(-.22,.22),r:rand(.8,2.2),e:0})}}
function sparkBurst(x,y){for(let i=0;i<14;i++){particles.push({x,y,vx:rand(-2.2,2.2),vy:rand(-2.2,2.2),r:rand(1,2.8),e:1.2,ttl:rand(16,34)})}}
function step(){
  ctx.clearRect(0,0,w,h);
  // edges/network lines near cursor
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>w)p.vx*=-1;
    if(p.y<0||p.y>h)p.vy*=-1;

    const dx=mouse.x-p.x, dy=mouse.y-p.y;
    const dist=Math.hypot(dx,dy);
    if(mouse.active && dist<140){
      const force=(1-dist/140)*0.09;
      p.vx += (-dy/dist||0)*force*0.8 + rand(-0.03,0.03);
      p.vy += (dx/dist||0)*force*0.8 + rand(-0.03,0.03);
      p.e=Math.min(1,p.e+0.08);
    } else {
      p.e=Math.max(0,p.e-0.02);
    }

    // friction
    p.vx*=0.995; p.vy*=0.995;

    const alpha=0.16 + p.e*0.8;
    ctx.beginPath();
    ctx.fillStyle=`rgba(132,221,255,${alpha})`;
    ctx.shadowColor='rgba(130,220,255,.75)';
    ctx.shadowBlur=8 + p.e*10;
    ctx.arc(p.x,p.y,p.r + p.e*0.6,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;

    if(p.ttl!==undefined){p.ttl--; if(p.ttl<=0){particles.splice(i,1); i--; continue;}}
  }

  // draw conductive links
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const a=particles[i], b=particles[j];
      const dx=a.x-b.x, dy=a.y-b.y; const d=Math.hypot(dx,dy);
      if(d<82){
        const e=Math.max(a.e,b.e);
        const op=(1-d/82)*(0.06+e*0.28);
        ctx.strokeStyle=`rgba(120,210,255,${op})`;
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
    }
  }

  requestAnimationFrame(step);
}
resize();initParticles();step();
window.addEventListener('resize',()=>{resize(); initParticles();});
window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.active=true; if(Math.random()<0.08) sparkBurst(mouse.x,mouse.y)});
window.addEventListener('mouseleave',()=>{mouse.active=false;mouse.x=-9999;mouse.y=-9999});
window.addEventListener('click',e=>sparkBurst(e.clientX,e.clientY));
</script>
</body>
</html>
